<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Selector</title>
    <meta name="description" content="ID Selector" >
    <style>    
        * { margin: 0; }
        /* id 선택자는 중복 선택해서 사용하지 않는 것을 추천함!! */    
        #h1 {
            /* 글자색: tomato, 가로: 300px, 높이:400px, 배경색: green */
            color: tomato;
            width: 300px;
            height: 400px;
            background-color: green;
            /* margin: 0; */
        }
        #h2 {
            /* 글자색: tomato, 배경색: yellow */
            color: tomato;
            background-color: yellow;
            /* margin: 0; */
        }
        #h3 {
            /* 글자색: blue, 배경색: yellow */
            color: blue;
            background-color: yellow;
            /* margin: 0; */
        }
    </style>
</head>
<body>
    <h1 id="h1">ID Selector #1</h1>
    <h1 id="h2">ID Selector #2</h1>
    <h1 id="h3">ID Selector #3</h1>
</body>
</html>
