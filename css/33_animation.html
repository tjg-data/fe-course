<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Style</title>
    <style>
        .box {
            width: 200px;
            height: 200px;
            border: 1px solid blue;
        }
        .box:hover {
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
            animation: changeColor 3s 0s 3;
        }
        @keyframes changeColor {
            from {
                /* 애니메이션 시작 시 스타일 정의*/
                background-color: aquamarine;
            }
            50% { background-color: yellow;}
            to {
                /* 애니메이션 종료 시 스타일 정의*/
                background-color: tomato;
            }
        }
        /* box-image */
        .box-image {
            width: 100%;
            height: 500px;
            background-image: url('../images/pattern2.jpg');
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        img { width: 200px; height: 200px; }
        .img1, .img2, .img3, .img4, .img5 {
            opacity: 0;
            animation: fadeInUp 3s ease forwards;
        }
        .img1 {
            animation-delay: 1s;
        }
        .img2 {
            animation-delay: 2s;
        }
        .img3 {
            animation-delay: 3s;
        }
        .img4 {
            animation-delay: 4s;
        }
        .img5 {
            animation-delay: 5s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <h1>Animation Style</h1>
    <div class="box">box animation</div>
    <div class="box-image">
        <img src="../images/favicon.ico" alt="ico" class="img1">
        <img src="../images/favicon.ico" alt="ico" class="img2">
        <img src="../images/favicon.ico" alt="ico" class="img3">
        <img src="../images/favicon.ico" alt="ico" class="img4">
        <img src="../images/favicon.ico" alt="ico" class="img5">
    </div>
</body>
</html>
