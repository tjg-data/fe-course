<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Index Style</title>
    <style>
        div {
            width: 200px;   height: 200px;
            color: #fff;
        }
        .red {
            background-color: red;
            position: relative;
            top: 20px;
            left: 50px;
            z-index: 101;
        }
        .blue {
            background-color: blue;
            position: relative;
            top: -50px;
            left: 100px;
            z-index: 100;
        }
        .green {
            background-color: green;
            position: relative;
            top: -200px;
            left: 10px;
            z-index: 20000;
        }
    </style>
</head>
<body>
    <h1>Z-Index Style</h1>
    <div class="red">Child #1</div>
    <div class="blue">Child #2</div>
    <div class="green">Child #3</div>
</body>
</html>
