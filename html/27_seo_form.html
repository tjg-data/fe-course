<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입폼</title>
    <meta name="description" content="회원가입 폼을 작성한 예제입니다">
</head>
<body>
    <main>
    <h1>회원가입</h1>
    <form action="#" method="GET"><!-- method : GET/POST -->
        <!-- GET : 서버에 데이터 전송 방식으로 URL을 사용함, Query String(쿼리스트링)
                    네트웍 패킷의 헤더에 함께 전송-->
        <!-- POST : 서버에 데이터 전송 시 네트웍 패킷의 바디에 함께 전송 -->
        <fieldset>
            <legend>개인 정보 입력</legend>
        <ul>
            <li>
                <label for="id">아이디</label>
                <input type="text" name="id" id="id"> 
            </li>
            <li>
                <label for="password">패스워드</label>
                <input type="password" name="password" id="password"> 
            </li>
            <li>
                <label for="name">이름</label>
                <input type="text" name="name" id="name"> 
            </li>
            <!-- <fieldset>
                <legend>주소 선택 태그</legend> -->
            <li>
                <label for="address1">주소1</label>
                <input type="text" name="address1" id="address1"> 
            </li>
            <li>
                <label for="address2">주소2</label>
                <input type="radio" name="address2" value="서울시" id="address2"><span>서울시</span>
                <input type="radio" name="address2" value="인천시" id="address2"><span>인천시</span>
                <input type="radio" name="address2" value="부산시" id="address2"><span>부산시</span>
            </li>
            <li>
                <label for="address3">주소3</label>
                <input type="checkbox" name="address3" value="seoul" id="address3"><span>서울시</span>
                <input type="checkbox" name="address3" value="인천" id="address3"><span>인천시</span>
                <input type="checkbox" name="address3" value="부산" id="address3"><span>부산시</span>
            </li>
            <li>
                <label for="address4">주소4</label>
                <select name="address4" id="address4">
                    <option value="선택">주소를 선택해주세요</option>
                    <option value="서울시">서울시</option>
                    <option value="인천시">인천시</option>
                    <option value="부산시">부산시</option>
                </select>
            </li>
            <!-- </fieldset> -->
            <li>
                <label for="birthday">생년월일</label>
                <input type="date" name="birthday" id="birthday">
            </li>
            <li>
                <label for="photo">프로필사진업로드</label>
                <input type="file" name="photo" id="photo">
            </li>
            <li>
                <label for="intro">자기소개</label>
                <textarea name="intro" 
                    cols="50" rows="10"
                    placeholder="100자 이내로 작성해주세요"
                    id="intro"></textarea>
            </li>
            <li>
                <button type="submit">전송</button><!-- default : submit -->
                <button type="button">전송(이벤트X)</button>
                <button type="reset">다시쓰기</button>
            </li>
        </ul>
        </fieldset>
    </form>
    </main>
</body>
</html>
