<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'nbg';
            src: url('../fonts/NanumBarunGothic.eot');
        }
        * { 
            font-family: '맑은 고딕','Nanum Gothic';
            /* background-color: rgb(246, 245, 239); */
            box-sizing: border-box;
            margin: 0; 
            padding: 0;
        }
        header {
            /* border: 1px solid red; */
            font-family: 'nbg';
            width: 100%;            
            background-color: rgb(246, 245, 239);       
        }
        .header-content {
            width: 1200px;
            margin: auto;
            display: flex;  
            justify-content: space-between; 
            /* border: 2px solid red;  */
            padding-top: 20px;  
            position: relative;         
        }
        .header-menu {

        }   
        .header-menu-top ul, 
        .header-menu-bottom ul {
            display: flex;
            list-style: none;
            /* border: 1px solid blue; */
            justify-content: right;
        }
        .header-menu-top ul { 
            gap: 20px;
            font-size: .9rem;
        }
        .header-menu-bottom ul { gap: 30px; }
        .header-menu-top ul a, 
        .header-menu-bottom ul a {
            text-decoration: none;
            color: #333;
        }
        .header-menu-top ul a {
            letter-spacing: -0.5px;
            
        }
        .header-menu-bottom ul a {
            font-family: 'nbg';
            font-size: .9rem;
        }
        .header-menu-top li:last-child {
            border: 1px solid gray;
            border-radius: 4px;
            padding: 5px;
            background-color: white;
        }
        .header-menu-top li:last-child i{
            font-size: 1.5rem;
            font-weight: 700;
            background-color: white;
        }
        .header-menu-top li:last-child input{
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-logo">
                <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="Logo">
            </div>
            <div class="header-menu">
                <nav class="header-menu-top">
                    <ul>
                        <li><a href="#">Sign In</a></li>
                        <li><a href="#">My Starbucks</a></li>
                        <li><a href="#">Customer Service & Ideas</a></li>
                        <li><a href="#">Find a Store</a></li>
                        <li>
                            <input type="text">
                            <a href="#"><i class="fa-brands fa-sistrix"></i></a>
                        </li>
                    </ul>
                </nav>
                <nav class="header-menu-bottom">
                    <ul class="main-menu">
                        <li class="menu-item"><a href="#" class="menu-link">COFFEE</a></li>
                        <li class="menu-item"><a href="#" class="menu-link">MENU</a></li>
                        <li class="menu-item"><a href="#" class="menu-link">STORE</a></li>
                        <li class="menu-item"><a href="#" class="menu-link">ESG</a></li>
                        <li class="menu-item"><a href="#" class="menu-link">STARBUCKS REWARDS</a></li>
                        <li class="menu-item"><a href="#" class="menu-link">CORPORATE SALES</a></li>
                        <li class="menu-item"><a href="#" class="menu-link">WHAT'S NEW</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
</body>
</html>
