<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        header {
            background: #f6f6f6;
        }
        .gnb {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;   
        }
        .main-menu {
            list-style: none;
            display: flex;
            align-items: center;
        }
        .menu-item {
            /* position: relative; */
        }
        .menu-link {
            display: block;
            padding: 20px 24px;
            text-decoration: none;
            color: #222;
            font-weight: 500;
        }
        .menu-link:hover {
            background: #2d2926;
            color: #9acd32;
        }
        /* 서브메뉴 기본 숨김 */
        .submenu {
        display: none;
        position: absolute;
        top: 100%;
        left: 0; /* nav.gnb 기준으로 */
        min-width: 1000px;
        background: #2d2926;
        color: white;
        padding: 24px 32px;
        z-index: 1000;
        }

        .submenu-inner {
            display: flex;
            gap: 80px;
            /* border: 1px solid yellow; */
        }

        .submenu-column h3 {
        font-size: 18px;
        margin-bottom: 16px;
        }

        .submenu-column a {
        display: block;
        text-decoration: none;
        color: #ccc;
        margin-bottom: 10px;
        font-size: 14px;
        }

        .submenu-column a:hover {
        color: #fff;
        }

        dl > dt { 
            font-size: 0.8em;
            padding: 10px;
        }
        dd > a {
            color: rgb(153, 153, 153);
            text-decoration: none;
            font-size: 0.8em;
        }

        .menu-item:hover .submenu {
        display: block;
        }
    </style>
</head>
<body>
    <header>
        <nav class="gnb">
            <ul class="main-menu">
                <li class="menu-item">
                    <a href="#" class="menu-link">COFFEE</a>
                    <div class="submenu">
                        <div class="submenu-inner">
                            <dl>
                                <dt>커피</dt>
                                <dd><a href="#">스타벅스 원두</a></dd>
                                <dd><a href="#">스타벅스 비아</a></dd>
                                <dd><a href="#">스타벅스 오리가미</a></dd>
                            </dl>
                            <dl>
                                <dt>커피이야기</dt>
                                <dd><a href="#">농장에서 우리손으로</a></dd>
                                <dd><a href="#">최상의 아라비카원두</a></dd>
                            </dl>
                        </div>
                    </div>
                </li>
                <li class="menu-item">
                    <a href="#" class="menu-link">MENU</a>
                    <div class="submenu">
                        <div class="submenu-inner">
                            <dl>
                                <dt>음료</dt>
                                <dd><a href="#">콜드 브루</a></dd>
                                <dd><a href="#">에스프레소</a></dd>
                                <dd><a href="#">프라푸치노</a></dd>
                            </dl>
                            <dl>
                                <dt>푸드</dt>
                                <dd><a href="#">브래드</a></dd>
                                <dd><a href="#">케이크</a></dd>
                            </dl>
                        </div>
                    </div>
                </li>
                <li class="menu-item">
                    <a href="#" class="menu-link">STORE</a>
                    <div class="submenu">
                        <div class="submenu-inner">
                            <dl>
                                <dt>매장찾기</dt>
                                <dd><a href="#">퀵찾기</a></dd>
                                <dd><a href="#">지역검색</a></dd>
                            </dl>
                            <dl>
                                <dt>드라이브스루 매장</dt>
                            </dl>
                        </div>
                    </div>
                </li>
            </ul>
        </nav>
    </header>
</body>
</html>
