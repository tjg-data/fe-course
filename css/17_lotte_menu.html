<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotte Cinema</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        header {
            /* border: 1px solid green; */
            width: 1000px;
            margin: auto;
        }
        .header-top {
            border-bottom: 1px solid #666;
            display: flex;
            justify-content: space-between;
        }
        ul {
            /* border: 1px solid blue; */
            display: flex;
            gap: 20px;
            list-style: none;
            padding: 0;
        }
        ul a {
            text-decoration: none;
            font-size: 0.8rem;
            color: #333;
        }
        .header-top-left {
            gap: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <nav>
                <ul class="header-top-left">
                    <li><a href="#"><i class="fa-brands fa-instagram"></i> 인스타그램</a></li>
                    <li><a href="#"><i class="fa-brands fa-youtube"></i> 유튜브</a></li>
                    <li><a href="#"><i class="fa-brands fa-facebook"></i> 페이스북</a></li>
                </ul>
            </nav>
            <div>
                <img src="https://www.lottecinema.co.kr/NLCHS/Content/images/common/logo.png" 
                    alt="lottecinema logo">
            </div>
            <nav>
                <ul class="header-top-right">
                    <li><a href="#">멤버십</a></li>
                    <li><a href="#">고객센터</a></li>
                    <li><a href="#">단체관람/대관문의</a></li>
                    <li><a href="#">로그인</a></li>
                </ul>
            </nav>
        </div>
    </header>
</body>
</html>
