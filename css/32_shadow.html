<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Style</title>
    <style>
        .text {
            text-shadow: 10px 5px 0 rgb(97, 89, 89, 0.5);
        }
        .box {
            width: 500px;
            height: 300px;
            background-color: aquamarine;
            box-shadow: 20px 17px 22px -1px rgba(77,44,44,0.75);
            -webkit-box-shadow: 20px 17px 22px -1px rgba(77,44,44,0.75);
            -moz-box-shadow: 20px 17px 22px -1px rgba(77,44,44,0.75);
        }
    </style>
</head>
<body>
    <h1>Shadow Style</h1>
    <h2 class="text">Text-Shadow</h2>
    <h2 class="box">Box-Shadow</h2>
</body>
</html>
