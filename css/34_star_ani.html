<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star animation</title>
    <style>
        main { border: 1px solid red; }
        * { 
            /* background-color: yellow; */
        }

        /*=== 배너 백그라운드 이미지 ===*/
        .main-top-bg-wrap {
            width: 100%;
            height: 32.3vw;
            background-image: url('https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg');
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            position: relative;
        }   
        .main-top-slogan {
            position: absolute;
            opacity: 1;
            top: 34.83%;
            width: 23.5%;
            left: 11.4%;
        }
        .slogan {
            max-width: 100%;
            vertical-align: top;
            overflow-clip-margin: content-box;
        }
        .main-top-menus {
            position: absolute;
        }
        .set-01 {
            z-index: 10;
            top: 17.03%;
            left: 35.35%;
            width: 11.3%;  
        }
        .set-02 {
            z-index: 10;
            top: 26.471%;
            left: 44.4%;
            width: 10.95%;  
        }
        .set-03 {
            z-index: 10;
            top: 16.874%;
            left: 50.7%;
            width: 13.5%;  
        }
        .set-04 {
            z-index: 9;
            top: 16.874%;
            left: 62%;
            width: 11.15%;
        }
        .set-05 {
            z-index: 8;
            top: 16.874%;
            left: 70.2%;
            width: 11.5%;  
        }
        .btn-slogan {
            z-index: 10;
            width: 23.5%;
            height: 38px;
            top: 59.29%;
            left: 11.35%;
            text-align: center;            
        }
        .btn-slogan a {
            font-size: 15px;
            display: block;
            width: 34%;
            height: 100%;
            margin: 0 auto;
            color: #ac85ba;
            border: 2px solid #ac85ba;
            border-radius: 5px;
            text-decoration: none;
            text-align: center;
            box-sizing: border-box;
            color: #666;
            line-height: 34px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <main>
        <!-- 상단 배너 이미지 -->
        <section class="main-top-banner">
            <div class="main-top-bg-wrap">
                <div class="main-top-banner-inner">
                    <div class="main-top-slogan">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_slogan_260220.png" 
                            alt="slogan image"
                            class="slogan">
                    </div>
                    <div class="main-top-menus set-01">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink01_260220.png" 
                            alt="menu img1" >
                    </div>
                    <div class="main-top-menus set-02">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink02_260220.png" 
                            alt="menu img2" >
                    </div>
                    <div class="main-top-menus set-03">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink03_260220.png" 
                            alt="menu img3" >
                    </div>
                    <div class="main-top-menus set-04">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink04_260220.png" 
                            alt="menu img4" >
                    </div>
                    <div class="main-top-menus set-05">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink05_260220.png" 
                            alt="menu img5" >
                    </div>
                    <div class="main-top-menus btn-slogan">
                        <a href="#">자세히 보기</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
