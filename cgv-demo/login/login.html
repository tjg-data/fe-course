<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGV-Demo</title>
    <link rel="stylesheet" href="../css/cgv.css">
    <link rel="stylesheet" href="../css/commons.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="../js/cgv_login.js"></script>  

</head>
<body>
    <!-- header -->
    <iframe src="../header.html" frameborder="0" width="100%" height="150px"></iframe>

    <!-- content start -->
    <div class="content">
        <div class="center-layout login-form">
            <h1 class="center-title">로그인</h1>
            <form action="#" method="post">
                <ul>
                    <li>
                        <p>아이디, 비밀번호를 입력하신 후, 로그인 버튼을 클릭해주세요.</p>
                    </li>
                    <li>
                        <div class="login-form-input">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" 
                                    name="id"
                                    id="id"
                                    placeholder="아이디를 입력해주세요">
                        </div>
                        <p id="idMsg"></p>
                        <div class="login-form-input">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" 
                                    name="pwd"
                                    id="pwd"
                                    placeholder="비밀번호를 입력해주세요">                            
                        </div>
                        <p id="pwdMsg"></p>
                    </li>
                    <li>
                        <button type="button"
                                class="btn-main-color"
                                id="btnLogin"
                                >로그인</button>
                    </li>
                </ul>
            </form>
        </div>
    </div>
    <!-- content end -->

    <!-- footer -->
    <iframe src="../footer.html" frameborder="0" width="100%" height="500px"></iframe>
</body>
</html>
